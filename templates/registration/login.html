{% extends "base.html" %}

{% block content %}
<style>
    .login-card {
        background-color: rgba(21, 21, 23, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid #27272a;
        border-radius: 12px;
        padding: 30px;
        width: 100%;
        box-sizing: border-box;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
    }

    .login-header {
        color: #ffffff;
        text-align: center;
        margin-bottom: 25px;
        font-weight: 800;
        text-transform: uppercase;
        font-size: 1.3rem;
        letter-spacing: 1px;
    }

    form p { margin-bottom: 15px; }
    form label {
        display: block;
        margin-bottom: 5px;
        color: #a1a1aa;
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
    }
    form input {
        width: 100%;
        padding: 12px;
        background-color: #18181b;
        border: 1px solid #3f3f46;
        border-radius: 6px;
        color: #ffffff;
        box-sizing: border-box;
    }
    form input:focus { border-color: #f97316; outline: none; }

    .btn-submit {
        width: 100%;
        padding: 15px;
        background-color: #f97316;
        color: #ffffff;
        border: none;
        border-radius: 8px;
        font-weight: 800;
        text-transform: uppercase;
        cursor: pointer;
        margin-top: 10px;
    }

    .btn-submit:hover {
        background-color: rgba(39, 39, 42, 0.8);
        color: #ffffff;
        border-color: #52525b;
        transform: translateY(-2px);
    }

    .forgot-password-container {
        text-align: center;
        margin-top: 20px;
    }

    .forgot-password-link {
        color: #a1a1aa;
        font-size: 0.75rem;
        text-decoration: none;
        text-transform: uppercase;
        font-weight: 600;
        letter-spacing: 0.5px;
        transition: color 0.2s;
    }

    .forgot-password-link:hover {
        color: #f97316;
    }
</style>

<div class="login-card">
    <div class="login-header">Log In</div>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-submit">Log In</button>
    </form>

    <div class="forgot-password-container">
        <a href="{% url 'password_reset' %}" class="forgot-password-link">Forgot Password?</a>
    </div>

</div>
{% endblock %}
