{% extends "base.html" %}

{% block content %}
<style>
    /* Reusing your existing theme */
    .reset-card {
        background-color: rgba(21, 21, 23, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid #27272a;
        border-radius: 12px;
        padding: 40px;
        width: 100%;
        max-width: 450px;
        box-sizing: border-box;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        margin: 0px auto;
    }

    .reset-header {
        color: #ffffff;
        text-align: center;
        margin-bottom: 10px;
        font-weight: 800;
        text-transform: uppercase;
        font-size: 1.3rem;
        letter-spacing: 1px;
    }

    .reset-description {
        color: #a1a1aa;
        text-align: center;
        font-size: 0.9rem;
        margin-bottom: 30px;
        line-height: 1.5;
    }

    /* Form Styling */
    form p { margin-bottom: 20px; }
    form label {
        display: block;
        margin-bottom: 8px;
        color: #f97316; /* Accent color for the label */
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
    }
    
    form input {
        width: 100%;
        padding: 14px;
        background-color: #18181b;
        border: 1px solid #3f3f46;
        border-radius: 8px;
        color: #ffffff;
        box-sizing: border-box;
        transition: border-color 0.2s;
    }

    form input:focus { border-color: #f97316; outline: none; }

    /* Centering the Recaptcha */
    .g-recaptcha {
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
    }

    .btn-submit {
        width: 100%;
        padding: 15px;
        background-color: #f97316;
        color: #ffffff;
        border: none;
        border-radius: 8px;
        font-weight: 800;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .btn-submit:hover {
        background-color: #ea580c;
        transform: translateY(-2px);
    }

    .errorlist {
    color: #ef4444; /* Red */
    list-style: none;
    padding: 0;
    font-size: 0.8rem;
    margin-bottom: 10px;
    }
</style>

<div class="reset-card">
    <div class="reset-header">Forgot Password?</div>
    <p class="reset-description">
        Enter your email address below, and we'll send you instructions to reset your password.
    </p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-submit">Send Reset Link</button>
    </form>
</div>
{% endblock %}
