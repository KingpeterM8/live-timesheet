{% extends "base.html" %}

{% block content %}
<style>
    .message-card {
        background-color: rgba(21, 21, 23, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid #27272a;
        border-radius: 12px;
        padding: 40px;
        width: 100%;
        max-width: 450px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        margin: 40px auto;
    }

    .icon-box {
        font-size: 3rem;
        margin-bottom: 20px;
    }

    .message-header {
        color: #ffffff;
        font-weight: 800;
        text-transform: uppercase;
        font-size: 1.3rem;
        letter-spacing: 1px;
        margin-bottom: 15px;
    }

    .message-text {
        color: #a1a1aa;
        line-height: 1.6;
        margin-bottom: 30px;
    }

    .btn-submit {
        display: block;
        padding: 15px;
        background-color: #f97316;
        color: #ffffff;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 800;
        text-transform: uppercase;
        transition: all 0.2s ease;
    }

    .btn-submit:hover {
        background-color: #ea580c;
        transform: translateY(-2px);
    }
</style>

<div class="message-card">
    <div class="icon-box">🔒</div>
    <div class="message-header">Password Set!</div>
    <p class="message-text">
        Your new password has been successfully applied. You can now use it to access your timesheet.
    </p>
    <a href="{% url 'login' %}" class="btn-submit">Log In Now</a>
</div>
{% endblock %}
