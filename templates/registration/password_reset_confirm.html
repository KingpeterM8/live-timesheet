{% extends "base.html" %}

{% block content %}
<style>
    form p {
    margin-bottom: 20px;
    color: #ffffff;
    }

    /* Style the labels to match your orange theme */
    form label {
        display: block;
        margin-bottom: 8px;
        color: #f97316;
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
    }

    /* Style the actual input boxes */
    form input[type="password"],
    form input[type="text"] {
        width: 100%;
        padding: 12px;
        background-color: #18181b;
        border: 1px solid #3f3f46;
        border-radius: 6px;
        color: #ffffff;
        box-sizing: border-box;
        transition: border-color 0.2s;
    }

    form input:focus {
        border-color: #f97316;
        outline: none;
    }

    /* Style the validation requirement list (the bullet points) */
    .helptext, form ul {
        color: #a1a1aa;
        font-size: 0.75rem;
        margin-top: 8px;
        padding-left: 20px;
        line-height: 1.4;
    }

    form ul li {
        margin-bottom: 4px;
    }

    /* Clean up the confirmation text that appears next to the field */
    .helptext {
        display: block;
        margin-bottom: 10px;
    }

    /* Ensure the button matches your login button exactly */
    .btn-submit {
        width: 100%;
        padding: 15px;
        background-color: #f97316;
        color: #ffffff;
        border: none;
        border-radius: 8px;
        font-weight: 800;
        text-transform: uppercase;
        cursor: pointer;
        margin-top: 10px;
    }

    /* Makes the password requirements less distracting until needed */
    form .helptext {
        opacity: 0.7;
        font-style: italic;
    }
    /* Container for errors - usually a UL */
    .errorlist {
        list-style: none;
        padding: 0;
        margin: 5px 0 15px 0;
    }

    /* The specific text for the requirement that failed */
    .errorlist li {
        color: #ff4444; /* A vibrant, readable red */
        font-size: 0.8rem;
        font-weight: 600;
        padding: 8px 12px;
        background-color: rgba(255, 68, 68, 0.1); /* Subtle red tint background */
        border-left: 3px solid #ff4444; /* Accent bar on the left */
        border-radius: 4px;
        margin-bottom: 5px;
    }

    /* Ensure the input box itself glows red when there is an error */
    .form-row.errors input {
        border-color: #ff4444 !important;
    }
        .errors label {
        color: #ff4444 !important;
    }

</style>

<div class="reset-card">
    {% if validlink %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-submit">Update Password</button>
        </form>
    {% else %}
        <div class="reset-header">Invalid Link</div>
        <p class="reset-description">The password reset link was invalid, possibly because it has already been used or has expired.</p>
        <a href="{% url 'password_reset' %}" class="btn-submit" style="text-decoration:none; display:block; text-align:center;">Request New Link</a>
    {% endif %}
</div>
{% endblock %}
