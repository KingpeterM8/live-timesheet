{% extends "base.html" %}

{% block content %}
<style>
    .message-card {
        background-color: rgba(21, 21, 23, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid #27272a;
        border-radius: 12px;
        padding: 40px;
        width: 100%;
        max-width: 450px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        margin: 0px auto;
    }

    .icon-box {
        font-size: 3rem;
        margin-bottom: 20px;
    }

    .message-header {
        color: #ffffff;
        font-weight: 800;
        text-transform: uppercase;
        font-size: 1.3rem;
        letter-spacing: 1px;
        margin-bottom: 15px;
    }

    .message-text {
        color: #a1a1aa;
        line-height: 1.6;
        margin-bottom: 30px;
    }

    .btn-back {
        display: inline-block;
        padding: 12px 25px;
        background-color: #27272a;
        color: #ffffff;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 0.9rem;
        transition: all 0.2s;
    }

    .btn-back:hover {
        background-color: #3f3f46;
        transform: translateY(-2px);
    }
</style>

<div class="message-card">
    <div class="icon-box">📧</div>
    <div class="message-header">Check Your Inbox</div>
    <p class="message-text">
        We've emailed you instructions for setting your password. If an account exists with the email you entered, you should receive it shortly.
    </p>
    <a href="{% url 'login' %}" class="btn-back">Return to Login</a>
</div>
{% endblock %}
