<style>
    ul, li {
    margin: 0;
    padding: 0;
    list-style: none;
    }

    body {
        background: linear-gradient(-45deg, #000000, #1a0a02, #000000, #261105);
        background-size: 400% 400%;
        animation: gradientShift 15s ease infinite;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;

        /* Flexbox to center the WHOLE group */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center; /* This handles the vertical centering */
        min-height: 100vh;
        width: 100%;
        padding: 0px 0px; /* Use small padding instead of 250px */
    }

    @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .content-wrapper {
        width: 100%;
    }

    /* Style for Django's default error list */
    .errorlist {
        color: #f87171; /* A soft red/coral that looks great on black */
        list-style: none;
        padding: 0;
        margin: 0 0 20px 0;
        font-size: 0.9rem;
        font-weight: 600;
        text-align: center;
        border: 1px solid #7f1d1d;
        background-color: rgba(127, 29, 29, 0.2);
        border-radius: 6px;
        padding: 10px;
        /* This makes the box pop if there is an error */
        animation: shake 0.4s ease-in-out;
    }

    .errorlist li {
        margin: 0;
    }

    /* Optional: Shake animation for a more "active" feel */
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
    }

    /* Also target field-specific errors just in case */
    .errornote {
        color: #f97316;
        font-weight: bold;
        display: block;
        margin-bottom: 10px;
}
    .main-title {
        color: #f97316;
        text-transform: uppercase;
        font-size: 2.8rem;
        font-weight: 900;
        letter-spacing: 1px;
        text-align: center;
        margin-bottom: 30px; /* Changed from 45px to 5px */
        line-height: 1;
    }

    .main-title .sub-title {
        display: block; /* Moves 'Timesheet' to its own line for a professional stacked look */
        font-size: 1.2rem; /* Much smaller than the main name */
        font-weight: 400; /* Thinner weight for contrast */
        letter-spacing: 6px; /* High tracking for a modern, 'wide' cinematic feel */
        margin-top: 5px;
        color: #ffffff; /* Contrast against the orange, or keep #f97316 if preferred */
        opacity: 0.8;
    }

    /* Update the container to accommodate the wider layout you wanted */
    .main-container {
        display: flex;
        flex-direction: column;
        align-items: center; /* This is the most important line for horizontal centering */
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        padding: 0px 0px; /* Top/Bottom 20px, Left/Right 0 */
        box-sizing: border-box;
    }

    .brand-header {
    text-align: center;
    margin-bottom: 0px; /* Reduced from 70px or 33px */
    }

    .page-wrapper {

    }
</style>
<head>
    <title>{% block title %}Empyreal Timesheet{% endblock %}</title>
</head>
<body>
        <div class="main-container">
            <h1 class="main-title">
                Empyreal P&C <span class="sub-title">Timesheet</span>
            </h1>

            <div class="content-wrapper">
                {% block content %}{% endblock %}
            </div>
        </div>

</body>
