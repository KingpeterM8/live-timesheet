{% extends "base.html" %}

{% block content %}
<style>
    /* This container centers itself automatically because of base.html's flex settings */
    .button-container {
        background-color: rgba(24, 24, 27, 0.8);
        backdrop-filter: blur(12px);
        border: 1px solid #27272a;
        padding: 35px; /* Slightly reduced padding */
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);

        display: flex;
        gap: 15px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .btn {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        padding: 12px; /* Smaller padding makes the buttons sleeker */
        border: none;
        border-radius: 8px;
        font-size: 1rem; /* Slightly smaller text */
        font-weight: 800;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s ease-in-out;
        text-decoration: none;
        box-sizing: border-box;
        letter-spacing: 0.5px;
    }

    .btn-primary {
        background-color: #f97316;
        color: #ffffff;
        box-shadow: 0 1px 15px rgba(249, 115, 22, 0.2);
    }

    .btn-primary:hover {
        background-color: #ea580c;
        transform: translateY(-2px);
    }

    .btn-secondary {
        background-color: #27272a;
        color: #ffffff;
        border: 1px solid #3f3f46;
    }

    .btn-secondary:hover {
        background-color: #3f3f46;
        transform: translateY(-2px);
    }

    /* Target the Logout button specifically to keep it distinct */
    .btn-logout {
        color: #f87171;
        border-color: #7f1d1d;
        background: transparent;
    }
</style>

<div class="button-container">
    <a href="{% url 'submit_timesheet' %}" class="btn btn-primary">New Timesheet</a>
    <a href="{% url 'timesheet_history' %}" class="btn btn-secondary">History</a>

    <form action="{% url 'logout' %}" method="post" style="width: 100%; margin: 0;">
        {% csrf_token %}
        <button type="submit" class="btn btn-secondary btn-logout">Logout</button>
    </form>
</div>
{% endblock %}
