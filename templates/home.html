<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empyreal Painting Timesheet</title>
    <style>
        body {
            /* 1. Set up the gradient background */
            background: linear-gradient(-45deg, #09090b, #1f0d04, #09090b, #2a1105);
            background-size: 400% 400%;
            /* 2. Apply the animation */
            animation: gradientShift 15s ease infinite;

            color: #e4e4e7;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Prevents scrollbars from the animation */
        }

        /* 3. Define the keyframes for the background movement */
        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .title-container {
            margin-bottom: 40px;
            text-align: center;
            z-index: 1; /* Keeps text above the background */
        }

        h1 {
            color: #f97316;
            text-transform: uppercase;
            font-size: 2.5rem;
            font-weight: 900;
            margin: 50;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(249, 115, 22, 0.3); /* Added a subtle orange glow */
        }

        .card {
            background-color: rgba(21, 21, 23, 0.85); /* Made slightly transparent to show background */
            backdrop-filter: blur(10px); /* Adds a frosted glass effect over the animation */
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1;
        }

        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
            text-decoration: none;
            box-sizing: border-box;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background-color: #f97316;
            color: #ffffff;
            box-shadow: 0 1px 15px rgba(249, 115, 22, 0.2);
        }

        .btn-primary:hover {
            background-color: rgba(39, 39, 42, 0.8);
            color: #ffffff;
            border-color: #52525b;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="title-container">
        <h1>Empyreal P&C Timesheet</h1>
    </div>

    <div class="card">
        <a href="{% url 'submit_timesheet' %}" class="btn btn-primary">Record Time</a>
        <a href="{% url 'login' %}" class="btn btn-primary">Edit Time</a>
    </div>

</body>
</html>
